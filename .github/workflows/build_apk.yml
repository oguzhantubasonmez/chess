# GitHub’da release APK üretir; Actions sekmesinden veya main’e push ile çalışır.
# Çıktı: iş akışı özeti → Artifacts → satranc-2d-release-apk.zip içinde app-release.apk

name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: build-apk-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  android-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses || true

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build release APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: satranc-2d-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error
          retention-days: 30
